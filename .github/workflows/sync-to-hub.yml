name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to Hugging Face Hub
        run: |
          git remote add hf https://Emran5008:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Emran5008/curator-ai-backend
          git push --force hf main
