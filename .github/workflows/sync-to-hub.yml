name: Sync to Hugging Face Hub

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Clean up old references
          git remote rm hf 2>/dev/null || true
          
          # 2. Add the correct destination URL for your specific Space
          git remote add hf https://Emran5008:$HF_TOKEN@huggingface.co/spaces/Emran5008/curator-ai-backend
          
          # 3. Force push the code to Hugging Face
          git push --force hf HEAD:refs/heads/main
