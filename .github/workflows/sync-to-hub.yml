name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub CLI
        run: |
          pip install --upgrade huggingface-hub

      - name: Prepare Files for HF Space
        run: |
          mkdir -p hf_sync_tmp
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='.env' \
            ./ hf_sync_tmp/
          
          echo "✓ Files prepared for sync"

      - name: Authenticate with Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token $HF_TOKEN --add-to-git-credential

      - name: Clone HF Space Repository
        run: |
          git clone https://huggingface.co/spaces/Emran5008/curator-ai-backend hf_space
          cd hf_space
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions Bot"

      - name: Sync Content to HF Space
        run: |
          cd hf_space
          
          # Clear old content (keep .git for history)
          find . -maxdepth 1 -type f ! -name '.gitattributes' ! -name '.gitignore' -delete
          find . -maxdepth 1 -type d ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} + 2>/dev/null || true
          
          # Copy fresh files
          cp -r ../hf_sync_tmp/* .
          
          echo "✓ Content synced to local HF Space repo"

      - name: Commit and Push to HF Space
        run: |
          cd hf_space
          git add -A
          
          if git diff --cached --quiet; then
            echo "✓ No changes detected. Space is already in sync."
          else
            git commit -m "Auto-sync from GitHub (commit ${{ github.sha }})"
            git push
            echo "✓ Successfully pushed to HF Space"
          fi

      - name: Report Status
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SYNC COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "GitHub: ${{ github.repository }}"
          echo "HF Space: Emran5008/curator-ai-backend"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
