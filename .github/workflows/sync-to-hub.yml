name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure Git and Push
        run: |
          git config --global user.email "emran.dev.contact@gmail.com"
          git config --global user.name "Emran5008"
          git remote add space https://huggingface.co/spaces/Emran5008/curator-ai-backend
          git push --force https://Emran5008:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Emran5008/curator-ai-backend main
