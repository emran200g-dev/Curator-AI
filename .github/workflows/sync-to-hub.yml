name: Sync to Hugging Face Hub

on:
  push:
    branches: [main, master]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Clean up potential old reference mismatches
          git remote rm hf 2>/dev/null || true
          
          # 2. Add the completely corrected URL structure (lowercase usernames/spaces matching your log)
          git remote add hf https://emran200g:$HF_TOKEN@huggingface.co/spaces/emran200g/curator-ai
          
          # 3. Force push the clean code structure to Hugging Face's main branch
          git push --force hf HEAD:refs/heads/main
